services:
  postgres:
    image: postgres:16
    container_name: lazarus-postgres
    environment:
      POSTGRES_DB: lazarus_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "55432:5432"
    volumes:
      - lazarus_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d lazarus_db"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  lazarus_postgres_data:
